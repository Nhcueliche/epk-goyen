<!-- @dsCard group="Type" viewport="700x260" name="Type scale" subtitle="Hero → display → title → body → mono" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--ink-void); color: var(--text-primary); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid var(--border-hairline); }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); letter-spacing: .1em; width: 130px; flex: none; }
  .s { font-family: var(--font-display); text-transform: uppercase; line-height: 1; }
</style>
</head>
<body>
  <div class="r"><span class="tag">hero · 176px</span><span class="s" style="font-size:54px">GOYEN</span></div>
  <div class="r"><span class="tag">display · 80px</span><span class="s" style="font-size:40px">RIDER</span></div>
  <div class="r"><span class="tag">title · 44px</span><span class="s" style="font-size:28px">Trayectoria</span></div>
  <div class="r"><span class="tag">body · 16px</span><span style="font-family:var(--font-body); font-size:16px">sets sin bajadas, energía sostenida</span></div>
  <div class="r" style="border:none"><span class="tag">mono · 15px</span><span style="font-family:var(--font-mono); font-size:15px; letter-spacing:.1em">150–165 BPM</span></div>
</body>
</html>
