<!-- @dsCard group="Type" viewport="700x200" name="Display — Archivo Black" subtitle="Industrial grotesque, uppercase. Wordmark + section titles." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--ink-void); }
  .hero { font-family: var(--font-display); text-transform: uppercase; color: var(--text-primary); line-height: .9; letter-spacing: var(--tracking-display); }
  .big { font-size: 84px; }
  .row { display: flex; align-items: baseline; gap: 16px; margin-top: 14px; }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); letter-spacing: .12em; }
</style>
</head>
<body>
  <div class="hero big">GOYEN</div>
  <div class="row">
    <span class="hero" style="font-size: 34px">BIOGRAFÍA</span>
    <span class="lab">Archivo Black · 400 · uppercase · tracking −0.01em</span>
  </div>
</body>
</html>
