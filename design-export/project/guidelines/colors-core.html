<!-- @dsCard group="Colors" viewport="700x200" name="Core palette" subtitle="The five brand colors — void + electric blue + white" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: #0a0a14; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border-hairline); }
  .chip { height: 84px; }
  .meta { padding: 8px 10px; background: var(--ink-800); }
  .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#010108"></div><div class="meta"><div class="name">Void</div><div class="hex">#010108</div></div></div>
    <div class="sw"><div class="chip" style="background:#080557"></div><div class="meta"><div class="name">Deep</div><div class="hex">#080557</div></div></div>
    <div class="sw"><div class="chip" style="background:#0E0899"></div><div class="meta"><div class="name">Mid</div><div class="hex">#0E0899</div></div></div>
    <div class="sw"><div class="chip" style="background:#100AB5"></div><div class="meta"><div class="name">Mid+</div><div class="hex">#100AB5</div></div></div>
    <div class="sw"><div class="chip" style="background:#170EFF; box-shadow: var(--glow-electric) inset"></div><div class="meta"><div class="name">Electric</div><div class="hex">#170EFF</div></div></div>
    <div class="sw"><div class="chip" style="background:#FAFAFA"></div><div class="meta"><div class="name">White</div><div class="hex">#FAFAFA</div></div></div>
  </div>
</body>
</html>
