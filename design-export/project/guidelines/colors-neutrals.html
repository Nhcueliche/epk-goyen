<!-- @dsCard group="Colors" viewport="700x150" name="Void neutrals" subtitle="Blue-black surface scale — never pure black" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: #0a0a14; }
  .row { display: flex; gap: 0; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border-hairline); }
  .cell { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .n { font-family: var(--font-mono); font-size: 10px; letter-spacing: .1em; color: var(--text-muted); }
  .h { font-family: var(--font-mono); font-size: 11px; color: var(--text-primary); }
</style>
</head>
<body>
  <div class="row">
    <div class="cell" style="background:#010108"><div class="n">void</div><div class="h">#010108</div></div>
    <div class="cell" style="background:#04040f"><div class="n">900</div><div class="h">#04040f</div></div>
    <div class="cell" style="background:#07071c"><div class="n">800</div><div class="h">#07071c</div></div>
    <div class="cell" style="background:#0b0b2a"><div class="n">700</div><div class="h">#0b0b2a</div></div>
    <div class="cell" style="background:#12123f"><div class="n">600</div><div class="h">#12123f</div></div>
    <div class="cell" style="background:#1c1c54"><div class="n">500</div><div class="h">#1c1c54</div></div>
  </div>
</body>
</html>
