<!-- @dsCard group="Brand" viewport="700x300" name="Photography — blue duotone" subtitle="#010108 → #170EFF. All booth/live photos unified to one set." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 16px; background: var(--ink-void); display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  figure { margin: 0; position: relative; border-radius: var(--radius-sm); overflow: hidden; aspect-ratio: 3/2; }
  img { width: 100%; height: 100%; object-fit: cover; display: block; }
  figcaption { position: absolute; left: 10px; bottom: 8px; font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: #fff; z-index: 3; }
</style>
</head>
<body>
  <figure>
    <img src="../assets/photos/goyen-portrait.jpeg" alt="press portrait original">
    <figcaption>original</figcaption>
  </figure>
  <figure>
    <img src="../assets/photos/goyen-portrait-duotone.jpeg" alt="duotone treatment">
    <div class="gy-scanlines"></div>
    <figcaption>duotone + scanlines</figcaption>
  </figure>
</body>
</html>
